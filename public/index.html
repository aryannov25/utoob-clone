<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0c" />
    <meta
      name="description"
      content="UToob — a fan-made YouTube clone built for fun and learning. Not affiliated with YouTube, LLC or Google LLC."
    />
    <meta
      name="disclaimer"
      content="Fan project. Not affiliated with, endorsed by, or sponsored by YouTube, LLC or Google LLC. All product names, logos, and brands are property of their respective owners."
    />

    <!-- SVG favicon: gradient play logo matching the in-app header -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%23ff2e4d'/><stop offset='1' stop-color='%23ff5d7a'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='url(%23g)'/><path d='M12 10 L22 16 L12 22 Z' fill='white'/></svg>"
    />
    <link rel="apple-touch-icon" href="youtube-logo.png" />

    <!-- Preconnect Google Fonts so Inter loads faster -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- OpenGraph / social -->
    <meta property="og:title" content="UToob — a fan-made YouTube clone" />
    <meta
      property="og:description"
      content="Made for fun. A personal project — not affiliated with YouTube."
    />
    <meta property="og:type" content="website" />

    <title>UToob</title>
    <style>
      /* Paint the dark background before React hydrates so there's no
         white flash on first load. */
      html,
      body {
        background: #0a0a0c;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
